name: ROS

on:
  push:
    branches: [ main, devel ]
  pull_request:
    branches: [ main, devel ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_image: [ 'ros:humble', 'ros:jazzy' ]
    container:
      image: ${{ matrix.docker_image }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: colcon_ws/src
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libspdlog-dev
      - name: Additional ROS dependencies
        run: |
          apt update
          apt install -y python3-rosdep
          if [ ! -e /etc/ros/rosdep/sources.list.d/20-default.list ]; then rosdep init; fi
          cd ${GITHUB_WORKSPACE}/colcon_ws
          source /opt/ros/${ROS_DISTRO}/setup.bash
          rosdep update
          rosdep install -y -r --ignore-src --from-paths src --rosdistro ${ROS_DISTRO}
      - name: Colcon build
        run: |
          cd ${GITHUB_WORKSPACE}/colcon_ws
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build --symlink-install --cmake-args " -DCMAKE_BUILD_TYPE=Release"
